name: CD - Deploy a EKS

on:
  workflow_run:
    workflows: ["CI - Build y Push a ECR"]
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: innovatech-spa
  BACKEND_ECR_REPOSITORY: innovatech-spa-backend
  FRONTEND_ECR_REPOSITORY: innovatech-spa-frontend

jobs:
  deploy:
    name: Deploy a EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener registry ECR
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Preparar imagenes ECR en manifiestos
        run: |
          sed -i "s|image: innovatech-spa-frontend:latest|image: $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest|g" infra/k8s/frontend.yml
          sed -i "s|image: innovatech-spa-backend:ventas-latest|image: $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-latest|g" infra/k8s/backend-ventas.yml
          sed -i "s|image: innovatech-spa-backend:despacho-latest|image: $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-latest|g" infra/k8s/backend-despachos.yml

      - name: Limpiar recursos backend anteriores
        run: |
          kubectl delete deployment backend --ignore-not-found=true
          kubectl delete service backend --ignore-not-found=true
          kubectl delete hpa backend-hpa --ignore-not-found=true
          kubectl delete pod -l app=backend --force --grace-period=0 --ignore-not-found=true
          kubectl delete pod -l app=frontend --force --grace-period=0 --ignore-not-found=true

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f infra/k8s/

      - name: Validar despliegue
        run: |
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/backend-ventas --timeout=120s
          kubectl rollout status deployment/backend-despachos --timeout=120s
          kubectl get endpoints frontend backend-ventas backend-despachos mysql

      - name: Cargar datos demo
        run: |
          kubectl delete job seed-demo-data --ignore-not-found=true
          cat <<'EOF' | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: seed-demo-data
          spec:
            backoffLimit: 2
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: seed-demo-data
                    image: curlimages/curl:8.8.0
                    command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        until curl -fsS http://backend-ventas:8080/api/v1/ventas >/dev/null; do
                          echo "Esperando backend-ventas..."
                          sleep 5
                        done
                        until curl -fsS http://backend-despachos:8080/api/v1/despachos >/dev/null; do
                          echo "Esperando backend-despachos..."
                          sleep 5
                        done

                        ventas="$(curl -fsS http://backend-ventas:8080/api/v1/ventas)"
                        if [ "$ventas" = "[]" ]; then
                          curl -fsS -X POST http://backend-ventas:8080/api/v1/ventas \
                            -H "Content-Type: application/json" \
                            -d '{"direccionCompra":"Av. Providencia 1234, Santiago","valorCompra":159990,"fechaCompra":"2026-06-17","despachoGenerado":false}'
                          curl -fsS -X POST http://backend-ventas:8080/api/v1/ventas \
                            -H "Content-Type: application/json" \
                            -d '{"direccionCompra":"Los Leones 455, Santiago","valorCompra":89990,"fechaCompra":"2026-06-17","despachoGenerado":false}'
                          curl -fsS -X POST http://backend-ventas:8080/api/v1/ventas \
                            -H "Content-Type: application/json" \
                            -d '{"direccionCompra":"Av. Concon Renaca 220, Vina del Mar","valorCompra":249990,"fechaCompra":"2026-06-17","despachoGenerado":false}'
                        else
                          echo "Ventas ya tiene datos; no se duplican registros."
                        fi

                        despachos="$(curl -fsS http://backend-despachos:8080/api/v1/despachos)"
                        if [ "$despachos" = "[]" ]; then
                          curl -fsS -X POST http://backend-despachos:8080/api/v1/despachos \
                            -H "Content-Type: application/json" \
                            -d '{"fechaDespacho":"2026-06-18","patenteCamion":"ABCD12","intento":1,"idCompra":1,"direccionCompra":"Av. Providencia 1234, Santiago","valorCompra":159990,"despachado":false}'
                          curl -fsS -X POST http://backend-despachos:8080/api/v1/despachos \
                            -H "Content-Type: application/json" \
                            -d '{"fechaDespacho":"2026-06-18","patenteCamion":"EFGH34","intento":1,"idCompra":2,"direccionCompra":"Los Leones 455, Santiago","valorCompra":89990,"despachado":false}'
                        else
                          echo "Despachos ya tiene datos; no se duplican registros."
                        fi
          EOF
          kubectl wait --for=condition=complete job/seed-demo-data --timeout=120s
          kubectl logs job/seed-demo-data

      - name: Diagnostico si falla el despliegue
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl describe deployment frontend
          kubectl describe deployment backend-ventas
          kubectl describe deployment backend-despachos
          kubectl get endpoints frontend backend-ventas backend-despachos mysql
          kubectl get events --sort-by=.metadata.creationTimestamp
