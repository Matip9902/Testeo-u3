name: CD - Deploy a EKS

on:
  workflow_run:
    workflows: ["CI - Build y Push a ECR"]
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: innovatech-spa
  BACKEND_ECR_REPOSITORY: innovatech-spa-backend
  FRONTEND_ECR_REPOSITORY: innovatech-spa-frontend

jobs:
  deploy:
    name: Deploy a EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener registry ECR
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Preparar imagenes ECR en manifiestos
        run: |
          sed -i "s|image: innovatech-spa-frontend:latest|image: $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest|g" infra/k8s/frontend.yml
          sed -i "s|image: innovatech-spa-backend:ventas-latest|image: $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-latest|g" infra/k8s/backend-ventas.yml
          sed -i "s|image: innovatech-spa-backend:despacho-latest|image: $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-latest|g" infra/k8s/backend-despachos.yml

      - name: Limpiar recursos backend anteriores
        run: |
          kubectl delete deployment backend --ignore-not-found=true
          kubectl delete service backend --ignore-not-found=true
          kubectl delete hpa backend-hpa --ignore-not-found=true
          kubectl delete pod -l app=backend --force --grace-period=0 --ignore-not-found=true
          kubectl delete pod -l app=frontend --force --grace-period=0 --ignore-not-found=true

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f infra/k8s/

      - name: Validar despliegue
        run: |
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/backend-ventas --timeout=120s
          kubectl rollout status deployment/backend-despachos --timeout=120s
          kubectl get endpoints frontend backend-ventas backend-despachos mysql

      - name: Diagnostico si falla el despliegue
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl describe deployment frontend
          kubectl describe deployment backend-ventas
          kubectl describe deployment backend-despachos
          kubectl get endpoints frontend backend-ventas backend-despachos mysql
          kubectl get events --sort-by=.metadata.creationTimestamp
