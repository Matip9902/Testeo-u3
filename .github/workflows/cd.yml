name: CD - Deploy a EKS

on:
  workflow_run:
    workflows: ["CI - Build y Push a ECR"]
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: innovatech-spa
  BACKEND_ECR_REPOSITORY: innovatech-spa-backend
  FRONTEND_ECR_REPOSITORY: innovatech-spa-frontend

jobs:
  deploy:
    name: Deploy a EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener registry ECR
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com" >> $GITHUB_ENV

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Preparar imagenes ECR en manifiestos
        run: |
          sed -i "s|image: innovatech-spa-frontend:latest|image: $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest|g" infra/k8s/frontend.yml
          sed -i "s|image: innovatech-spa-backend:ventas-latest|image: $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-latest|g" infra/k8s/backend-ventas.yml
          sed -i "s|image: innovatech-spa-backend:despacho-latest|image: $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-latest|g" infra/k8s/backend-despachos.yml

      - name: Limpiar recursos backend anteriores
        run: |
          kubectl delete deployment backend --ignore-not-found=true
          kubectl delete service backend --ignore-not-found=true
          kubectl delete hpa backend-hpa --ignore-not-found=true
          kubectl delete pod -l app=backend --force --grace-period=0 --ignore-not-found=true
          kubectl delete pod -l app=frontend --force --grace-period=0 --ignore-not-found=true

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f infra/k8s/

      - name: Validar despliegue
        run: |
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/backend-ventas --timeout=120s
          kubectl rollout status deployment/backend-despachos --timeout=120s
          kubectl get endpoints frontend backend-ventas backend-despachos mysql

      - name: Cargar datos demo
        run: |
          kubectl delete job seed-demo-data --ignore-not-found=true
          cat <<'EOF' | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: seed-demo-data
          spec:
            backoffLimit: 2
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: seed-demo-data
                    image: python:3.12-alpine
                    command:
                      - python
                      - -c
                      - |
                        import json
                        import time
                        import urllib.error
                        import urllib.request

                        ventas_url = "http://backend-ventas:8080/api/v1/ventas"
                        despachos_url = "http://backend-despachos:8080/api/v1/despachos"

                        ventas_demo = [
                            {"direccionCompra": "Av. Providencia 1234, Santiago", "valorCompra": 159990, "fechaCompra": "2026-06-17", "despachoGenerado": False},
                            {"direccionCompra": "Los Leones 455, Santiago", "valorCompra": 89990, "fechaCompra": "2026-06-17", "despachoGenerado": False},
                            {"direccionCompra": "Av. Concon Renaca 220, Vina del Mar", "valorCompra": 249990, "fechaCompra": "2026-06-17", "despachoGenerado": False},
                        ]
                        despachos_demo = [
                            {"fechaDespacho": "2026-06-18", "patenteCamion": "ABCD12", "intento": 1, "idCompra": 1, "direccionCompra": "Av. Providencia 1234, Santiago", "valorCompra": 159990, "despachado": False},
                            {"fechaDespacho": "2026-06-18", "patenteCamion": "EFGH34", "intento": 1, "idCompra": 2, "direccionCompra": "Los Leones 455, Santiago", "valorCompra": 89990, "despachado": False},
                        ]

                        def request(method, url, payload=None):
                            data = None
                            headers = {}
                            if payload is not None:
                                data = json.dumps(payload).encode("utf-8")
                                headers["Content-Type"] = "application/json"
                            req = urllib.request.Request(url, data=data, headers=headers, method=method)
                            with urllib.request.urlopen(req, timeout=15) as res:
                                body = res.read().decode("utf-8")
                                return json.loads(body) if body else None

                        def wait_for(url, name):
                            for _ in range(24):
                                try:
                                    request("GET", url)
                                    return
                                except Exception:
                                    print(f"Esperando {name}...")
                                    time.sleep(5)
                            raise RuntimeError(f"{name} no estuvo disponible a tiempo")

                        wait_for(ventas_url, "backend-ventas")
                        wait_for(despachos_url, "backend-despachos")

                        demo_direcciones = {venta["direccionCompra"] for venta in ventas_demo}
                        for venta in request("GET", ventas_url):
                            if venta.get("direccionCompra") in demo_direcciones:
                                request("DELETE", f"{ventas_url}/{venta['idVenta']}")

                        demo_patentes = {despacho["patenteCamion"] for despacho in despachos_demo}
                        for despacho in request("GET", despachos_url):
                            if despacho.get("patenteCamion") in demo_patentes:
                                request("DELETE", f"{despachos_url}/{despacho['idDespacho']}")

                        for venta in ventas_demo:
                            request("POST", ventas_url, venta)
                        for despacho in despachos_demo:
                            request("POST", despachos_url, despacho)

                        print("Datos demo cargados sin duplicados.")
          EOF
          kubectl wait --for=condition=complete job/seed-demo-data --timeout=120s
          kubectl logs job/seed-demo-data

      - name: Diagnostico si falla el despliegue
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl describe deployment frontend
          kubectl describe deployment backend-ventas
          kubectl describe deployment backend-despachos
          kubectl get endpoints frontend backend-ventas backend-despachos mysql
          kubectl get events --sort-by=.metadata.creationTimestamp
