name: CI - Build y Push a ECR

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPOSITORY: innovatech-spa-backend
  FRONTEND_ECR_REPOSITORY: innovatech-spa-frontend

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Frontend
        working-directory: front_despacho
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Backend Ventas
        working-directory: backend/Springboot-API-REST-VENTAS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-${{ github.sha }} .
          docker tag $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-${{ github.sha }} $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-latest
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:ventas-latest

      - name: Build y Push Backend Despacho
        working-directory: backend/Springboot-API-REST-DESPACHO
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-${{ github.sha }} .
          docker tag $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-${{ github.sha }} $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-latest
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:despacho-latest
